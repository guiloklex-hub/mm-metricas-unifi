name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Generate migrations (drift check)
        env:
          DATABASE_PATH: ':memory:'
        run: npm run db:generate -- --custom check || true
      - name: Test
        env:
          MASTER_KEY: ${{ secrets.CI_MASTER_KEY || 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA' }}
          JWT_SECRET: ${{ secrets.CI_JWT_SECRET || 'ci-secret-please-do-not-use-in-prod-must-be-at-least-32-chars' }}
        run: npm run test
      - name: Coverage
        env:
          MASTER_KEY: ${{ secrets.CI_MASTER_KEY || 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA' }}
          JWT_SECRET: ${{ secrets.CI_JWT_SECRET || 'ci-secret-please-do-not-use-in-prod-must-be-at-least-32-chars' }}
        run: npm run test:coverage
      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (sem push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: mm-metricas-unifi:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
