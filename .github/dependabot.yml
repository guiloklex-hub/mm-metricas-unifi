version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    groups:
      fastify:
        patterns: ['fastify', '@fastify/*', 'fastify-*']
      drizzle:
        patterns: ['drizzle-orm', 'drizzle-kit']
      vitest:
        patterns: ['vitest', '@vitest/*']
      tanstack:
        patterns: ['@tanstack/*']
      types:
        patterns: ['@types/*']
        dependency-type: 'development'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    commit-message:
      prefix: 'ci(deps)'

  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'monthly'
    commit-message:
      prefix: 'chore(docker)'
