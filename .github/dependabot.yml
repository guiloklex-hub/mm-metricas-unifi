version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    groups:
      fastify:
        patterns: ['fastify', '@fastify/*', 'fastify-*']
        # `fastify-type-provider-zod` 5.x+ exige Zod 4 (breaking change largo).
        # Ignorado até migrarmos do Zod 3 para 4 deliberadamente.
        exclude-patterns: ['fastify-type-provider-zod']
      drizzle:
        patterns: ['drizzle-orm', 'drizzle-kit']
      vitest:
        patterns: ['vitest', '@vitest/*']
      tanstack:
        patterns: ['@tanstack/*']
      types:
        patterns: ['@types/*']
        dependency-type: 'development'
    ignore:
      - dependency-name: 'fastify-type-provider-zod'
        update-types: ['version-update:semver-major']
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    commit-message:
      prefix: 'ci(deps)'

  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'monthly'
    commit-message:
      prefix: 'chore(docker)'
