services:
  timescaledb:
    # Expõe a porta 5432 ao host APENAS em dev para permitir `psql` local.
    # Em produção (docker-compose.yml) a porta fica fechada na rede interna.
    ports:
      - '127.0.0.1:5432:5432'

  metricas-unifi:
    build: .
    container_name: metricas-unifi-dev
    restart: 'no'
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
